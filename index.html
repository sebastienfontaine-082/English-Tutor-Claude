<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#12151b">
<title>Talk — English practice</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <span class="wordmark">talk<span class="dot">.</span></span>
    <span id="versionTag" class="versionTag">v2.9</span>
    <button id="settingsBtn" class="iconBtn" aria-label="Settings">⚙</button>
  </header>

  <main class="stage">
    <div id="aiCaptionWrap" class="captionWrap zone">
      <p id="aiCaption" class="caption"></p>
    </div>

    <div class="orbArea">
      <canvas id="orbCanvas" width="600" height="600"></canvas>
      <button id="mainBtn" class="mainBtn" aria-label="Start or end conversation">
        <span id="btnLabel">TALK</span>
      </button>
      <span id="semanticDot" class="semanticDot" title="Semantic end-of-sentence detector (experimental, informational only)"></span>
    </div>
    <p id="status" class="status">Tap to start</p>

    <div id="userCaptionWrap" class="captionWrap zone">
      <p id="userCaption" class="caption"></p>
    </div>
  </main>

</div>

<!-- Settings panel -->
<div id="settingsPanel" class="overlay" hidden>
  <div class="sheet">
    <h2>Settings</h2>

    <label class="field">
      <span>Groq API key</span>
      <input id="apiKeyInput" type="password" placeholder="gsk_..." autocomplete="off" spellcheck="false">
    </label>
    <p class="hint">
      Free, no credit card. Get one at
      <a href="https://console.groq.com/keys" target="_blank" rel="noopener">console.groq.com/keys</a>.
      Stored only on this phone.
    </p>

    <label class="field">
      <span>Conversation topic (optional)</span>
      <input id="topicInput" type="text" placeholder="e.g. talk about my weekend, travel plans...">
    </label>

    <label class="field">
      <span>Voice</span>
      <select id="voiceSelect"></select>
    </label>

    <label class="field row">
      <span>Speaking speed</span>
      <input id="rateInput" type="range" min="0.7" max="1.3" step="0.05" value="1">
    </label>

    <label class="field row">
      <span>Pause tolerance — baseline (auto-adjusted by the indicator dot)</span>
      <input id="pauseInput" type="range" min="800" max="4000" step="100" value="2200">
    </label>
    <p class="hint" id="pauseHint">2.2s</p>

    <div class="sheetActions">
      <button id="resetConvoBtn" class="ghostBtn">Reset conversation</button>
      <button id="closeSettingsBtn" class="primaryBtn">Save &amp; close</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
